<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CaptureOS visual overview</title>
  <desc id="desc">Messy natural-language inputs route into three clear baskets: Task / Reminder, Event / Meeting, and Idea / Note.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="0.58" stop-color="#0B1220"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#67E8F9"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#A7F3D0"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#C4B5FD"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.25 0 0 0 0 0.9 0 0 0 0 1 0 0 0 0.45 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" stroke="#94A3B8" stroke-opacity="0.08"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <circle cx="1260" cy="140" r="300" fill="#22D3EE" opacity="0.08"/>
  <circle cx="220" cy="760" r="260" fill="#8B5CF6" opacity="0.09"/>

  <text x="120" y="132" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="72" font-weight="800" letter-spacing="-2">CaptureOS</text>
  <text x="124" y="184" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="30">Route messy input into three simple baskets.</text>

  <g filter="url(#softShadow)">
    <rect x="112" y="260" width="440" height="350" rx="32" fill="#0F172A" stroke="#334155" stroke-width="2"/>
    <text x="154" y="324" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="28" font-weight="700">Natural input</text>
    <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="23" fill="#94A3B8">
      <text x="156" y="386">“Dentist tomorrow 3pm”</text>
      <text x="156" y="438">“Follow up Friday”</text>
      <text x="156" y="490">“Idea: weekly report bot”</text>
      <text x="156" y="542">“Meeting notes from today”</text>
    </g>
  </g>

  <g filter="url(#glow)">
    <path d="M552 390 C690 390 708 282 845 282" stroke="url(#cyan)" stroke-width="8" stroke-linecap="round"/>
    <path d="M552 438 C700 438 708 450 845 450" stroke="url(#green)" stroke-width="8" stroke-linecap="round"/>
    <path d="M552 492 C690 492 708 620 845 620" stroke="url(#purple)" stroke-width="8" stroke-linecap="round"/>
  </g>

  <circle cx="725" cy="450" r="60" fill="#111827" stroke="#475569" stroke-width="2" filter="url(#softShadow)"/>
  <text x="725" y="440" text-anchor="middle" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="21" font-weight="800">AI</text>
  <text x="725" y="469" text-anchor="middle" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="16">router</text>

  <g filter="url(#softShadow)">
    <rect x="845" y="220" width="520" height="124" rx="28" fill="#082F49" stroke="#22D3EE" stroke-opacity="0.7" stroke-width="2"/>
    <circle cx="910" cy="282" r="24" fill="url(#cyan)"/>
    <path d="M900 282l8 8 18-20" stroke="#05212E" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="958" y="274" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="32" font-weight="800">Task / Reminder</text>
    <text x="958" y="314" fill="#BAE6FD" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="21">Things to do or remember</text>

    <rect x="845" y="388" width="520" height="124" rx="28" fill="#052E2B" stroke="#34D399" stroke-opacity="0.75" stroke-width="2"/>
    <circle cx="910" cy="450" r="24" fill="url(#green)"/>
    <path d="M900 436h20v28h-20zM900 444h20" stroke="#05211B" stroke-width="4" stroke-linejoin="round"/>
    <text x="958" y="442" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="32" font-weight="800">Event / Meeting</text>
    <text x="958" y="482" fill="#BBF7D0" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="21">Things that occupy calendar time</text>

    <rect x="845" y="558" width="520" height="124" rx="28" fill="#2E1065" stroke="#8B5CF6" stroke-opacity="0.8" stroke-width="2"/>
    <circle cx="910" cy="620" r="24" fill="url(#purple)"/>
    <path d="M899 612h22M899 622h15M899 632h19" stroke="#1E1238" stroke-width="5" stroke-linecap="round"/>
    <text x="958" y="612" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="32" font-weight="800">Idea / Note</text>
    <text x="958" y="652" fill="#DDD6FE" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="21">Knowledge, context, links, reflections</text>
  </g>

  <text x="120" y="804" fill="#64748B" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="22">Private-first • Markdown-friendly • Calendar/email integrations optional • Ask-first for ambiguity</text>
</svg>
